spring:
  application:
    name: saas-app
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        multi_tenancy: SCHEMA #pour le multi tenant
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:saas-app-db}}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    #driver-class-name: org.postgresql.Driver -- lu dans le pom.xml
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  #flyway configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations:
      - classpath:/db/migration/common
      - classpath:/db/migration/tenant
    schemas: public
    table: flyway_schema_history
    validate-on-migrate: true

#server configuration
server:
  port: ${SERVER_PORT:8080}
